<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Neon gradient -->
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1d976c"/>
      <stop offset="100%" stop-color="#06f3ff"/>
    </linearGradient>

    <!-- Strong glow -->
    <filter id="neonGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer bold ring -->
  <circle cx="512" cy="512" r="300"
    fill="none"
    stroke="url(#neonGradient)"
    stroke-width="24"
    filter="url(#neonGlow)" />

  <!-- Inner solid core -->
  <circle cx="512" cy="512" r="140"
    fill="none"
    stroke="#06f3ff"
    stroke-width="18"
    filter="url(#neonGlow)" />

  <!-- Simplified wrench (thick + readable) -->
  <path
    d="M620 420
       a60 60 0 1 0 60 60
       l-140 140
       -50 -50
       140 -140z"
    fill="none"
    stroke="url(#neonGradient)"
    stroke-width="28"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#neonGlow)" />

  <!-- Diagnostic pulse (bold zigzag) -->
  <polyline
    points="280,520 400,520 460,440 540,600 620,480 740,520"
    fill="none"
    stroke="#1d976c"
    stroke-width="20"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#neonGlow)" />

</svg>